name: Wingman
options:
  bundleIdPrefix: dev.wingman
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
packages:
  WingmanKit:
    path: ../WingmanKit
targets:
  Wingman:
    type: application
    platform: iOS
    sources:
      - Wingman
    dependencies:
      - package: WingmanKit
    info:
      path: Wingman/Info.plist
      properties:
        UILaunchScreen: {}
        NSCameraUsageDescription: Wingman uses the camera to scan the pairing QR code from your terminal.
        NSLocalNetworkUsageDescription: Wingman connects directly to your dev machine on the local network.
        NSMicrophoneUsageDescription: Wingman uses the microphone so you can dictate prompts to Copilot.
        NSSpeechRecognitionUsageDescription: Wingman transcribes your speech on-device to compose prompts.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7N46F2J273
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
