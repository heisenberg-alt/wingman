# Fly.io app spec for the Wingman relay.
# Deploy: scripts/deploy-relay.sh  (or: cd relay && fly launch --copy-config)
app = "wingman-relay"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  RELAY_LISTEN = ":8443"

[http_service]
  internal_port = 8443
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
